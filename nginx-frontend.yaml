# --- 1. 部署程式碼 (Deployment) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
  namespace: nginx-frontend
  annotations:
    # 這是給 Image Updater 看的：告訴它「我是由 ArgoCD 託管的」
    # 它會自動尋找關聯的 Application 並在發現新鏡像時更新此處
    argocd-image-updater.argoproj.io/on-update: "refresh" 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
      annotations:
        sidecar.istio.io/inject: "true"
        proxy.istio.io/config: |
          tracing:
            sampling: 100.0
    spec:
      containers:
      - name: portfolio-container
        image: asia-east1-docker.pkg.dev/gcp-gke-deploy/gke-images/portfolio:prod
        # --- 關鍵修正：確保固定標籤也能正確觸發重新拉取 ---
        imagePullPolicy: Always 
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
